# Rails-style database configuration.
# Copy from database.yml.example and adjust. Environment selected by APP_ENV.

default: &default
  adapter: postgresql
  encoding: utf8
  pool: 10
  timeout: 5000

development:
  <<: *default
  database: myapp_development
  username: postgres
  password: postgres
  host: localhost
  port: 5432

test:
  <<: *default
  database: myapp_test
  username: postgres
  password: postgres
  host: localhost
  port: 5432

production:
  <<: *default
  database: myapp_production
  username: postgres
  password: postgres
  host: localhost
  port: 5432
